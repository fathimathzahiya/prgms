<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-Commerce</title>
  <link rel="stylesheet" href="work.css">
</head>
<body>
<nav class="navbar">
  <!-- <h1 class="logo">Shop</h1> -->
  <img src="https://instamart-media-assets.swiggy.com/InstamartAssets/Bleed%20Blue/instamart%20logo.png?updatedAt=1755083583956" alt="Instamart Logo" class="hero-logo" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
  <section class="search">
   <input type="text" placeholder="Search products">
  <button>Search</button>
  </section>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Cart</a>
 
  </div>
</nav>

<main class="main">
  <aside class="sidebar">
    <h3>Categories ></h3>
    <span> Electronics</span>
    <span>Clothing</span>
    <span>Accessories</span>
  </aside>
  <section class="container">

    <article class="card">
      <img src="https://joypersonalcare.com/cdn/shop/files/Dry_Touch_SPF50_50ml_1500X1500_08f92e3f-5ea6-41e2-9dc8-09f96646fe52.jpg?v=1747218444">
      <h3><b>JOY</b> Sunscreen</h3>
      <p>$200</p>
      <button>Add to Cart</button>
    </article>

    <article class="card">
      <img src="https://tiimg.tistatic.com/fp/1/008/393/wireless-bluetooth-headphones-for-noise-cancelling-music-472.jpg">
      <h3><B>NOISE</B> Wireless bluetooth headphones</h3>
      <p>$300</p>
      <button>Add to Cart</button>
    </article>

    <article class="card">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTneo1ALfgw-ZGy_kai55QEUFnlO9htBfiDrg&s">
      <h3><b>MILMA</b> milk packets</h3>
      <p>$40</p>
      <button>Add to Cart</button>
    </article>

    <article class="card">
      <img src="https://img.pacifiko.com/PROD/resize/1/480x480/MjFiNWQ2Yz.jpg">
      <h3><B>KIKO</B> 3D Hydra iip gloss</h3>
      <p>$500</p>
      <button>Add to Cart</button>
    </article>

  </section>

</main>
</body>
</html>
